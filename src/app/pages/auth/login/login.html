<div class="container" style="min-height: 100vh; display: grid; place-items: center;">
  <div class="card card-pad" style="width: min(420px, 100%);">
    <h1 class="h1">Entrar</h1>
    <p class="sub">Use seu usuário e senha para acessar.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" style="margin-top: 16px; display: grid; gap: 14px;">
      <div class="field">
        <label>Username</label>
        <input formControlName="username" placeholder="" />
        @if(form.get('username')?.touched && form.get('username')?.invalid){
          <div class="helper" >
            Informe o username.
          </div>
        }
      </div>

      <div class="field">
        <label>Senha</label>
        <input type="password" formControlName="password" placeholder="" />
        @if (form.get('password')?.touched && form.get('password')?.invalid) 
        {
          <div class="helper" >
            Informe a senha.
          </div>
        }
        
      </div>
      @if(error){
      <div  class="alert error">{{ error }}</div>
      }

      <button class="btn primary" type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>

      <div class="helper" style="text-align:center;">
        Não tem conta? <a routerLink="/register">Criar conta</a>
      </div>
    </form>
  </div>
</div>
