<div class="container" style="min-height: 100vh; display: grid; place-items: center;">
  <div class="card card-pad" style="width: min(420px, 100%);">
    <h1 class="h1">Criar conta</h1>
    <p class="sub">Cadastre um usuário para continuar.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" style="margin-top: 16px; display: grid; gap: 14px;">
      
      <div class="field">
        <label>Username</label>
        <input formControlName="username" placeholder="" />
      </div>

      <div class="field">
        <label>Senha</label>
        <input type="password" formControlName="password" placeholder="" />
      </div>

      @if (error) {
        <div class="alert error">{{ error }}</div>
      }

      @if (success) {
        <div class="alert success">{{ success }}</div>
      }

      <button class="btn primary" type="submit" [disabled]="loading || form.invalid">
        {{ loading ? 'Criando...' : 'Criar conta' }}
      </button>

      <div class="helper" style="text-align:center;">
        Já tem conta? <a routerLink="/login">Entrar</a>
      </div>
    </form>
  </div>
</div>
